services:
  neo4j:
    image: neo4j:5.26-community
    container_name: acadmind-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/acadmind_dev_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j-init:
    image: neo4j:5.26-community
    container_name: acadmind-neo4j-init
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./backend/scripts/init_neo4j.cypher:/init.cypher:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        cypher-shell -a bolt://neo4j:7687 -u neo4j -p acadmind_dev_password -f /init.cypher || true
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: acadmind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acadmind-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acadmind-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.local
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  neo4j_data:
  redis_data:
  backend_uploads:
  frontend_node_modules:
